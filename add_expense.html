<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - Student Expense Splitter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">
                <h1>💰 Student Expense Splitter</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/add_expense" class="active">Add Expense</a></li>
                <li><a href="/view_expenses">View Expenses</a></li>
                <li><a href="/report">Monthly Report</a></li>
            </ul>
        </nav>

        <div class="form-container">
            <h2>Add New Expense</h2>
            
            <form method="POST" action="/add_expense" class="expense-form">
                <div class="form-group">
                    <label for="expense_date">Expense Date *</label>
                    <input type="date" id="expense_date" name="expense_date" 
                           value="{{ datetime.now().strftime('%Y-%m-%d') }}" required>
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="Food">🍔 Food</option>
                        <option value="Groceries">🛒 Groceries</option>
                        <option value="Transport">🚗 Transport</option>
                        <option value="Entertainment">🎬 Entertainment</option>
                        <option value="Stationery">📚 Stationery</option>
                        <option value="Utilities">💡 Utilities</option>
                        <option value="Rent">🏠 Rent</option>
                        <option value="Other">📌 Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="amount">Amount (₹) *</label>
                    <input type="number" id="amount" name="amount" step="0.01" 
                           placeholder="Enter amount" required>
                </div>

                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" name="description" rows="3" 
                              placeholder="Describe the expense..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="paid_by">Paid By</label>
                    <input type="text" id="paid_by" name="paid_by" 
                           placeholder="Who paid? (default: self)">
                </div>

                <div class="form-group">
                    <label for="split_with">Split With (comma-separated usernames)</label>
                    <input type="text" id="split_with" name="split_with" 
                           placeholder="e.g., john_doe, jane_smith">
                    <small>Leave empty if not splitting</small>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Expense</button>
                    <a href="/" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
